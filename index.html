<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mini Cassino</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="casino">
    <h1>🎰 Mini Cassino</h1>

    <div class="balance">
      Saldo: R$ <span id="balance">100</span>
    </div>

    <div class="slot">
      <div class="reel" id="r1">🍒</div>
      <div class="reel" id="r2">🍋</div>
      <div class="reel" id="r3">⭐</div>
    </div>

    <button onclick="spin()">GIRAR</button>

    <h2 id="result"></h2>
  </div>

  <script src="script.js"></script>
</body>
</html>
